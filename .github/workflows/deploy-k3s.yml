name: Deploy to VPS (k3s)

# Builds the service images (five Python targets + Meridian web) on GitHub
# runners, pushes them to GHCR,
# then SSHes to the VPS and runs deploy-k3s.sh with SKIP_BUILD=true so the
# VPS only pulls images and rolls the Helm release — no docker build on the
# 4GB box.
#
# Required secrets:
#   VPS_HOST, VPS_USER, VPS_SSH_KEY  — SSH access to the VPS
#   GHCR_PULL_TOKEN (optional)      — PAT with read:packages; only needed
#                                     while the GHCR packages are private
# Optional repo variables:
#   VPS_APP_DIR — repo checkout on the VPS (default: $HOME/travel-plan)
#   SMOKE_URL   — full URL curled after deploy (e.g. https://api.example.com/health/ready)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Deploy profile (values/env set)
        type: choice
        options: [external, local]
        default: external

concurrency:
  group: deploy-k3s
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        target: [query, reranker, itinerary, worker, image-enrichment, web]
    steps:
      - uses: actions/checkout@v4
      - id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # web (Meridian) has its own Dockerfile; the rest are targets in the
      # shared multi-stage infra/docker/Dockerfile.
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.target == 'web' && 'apps/web' || '.' }}
          file: ${{ matrix.target == 'web' && 'apps/web/Dockerfile' || 'infra/docker/Dockerfile' }}
          target: ${{ matrix.target == 'web' && '' || matrix.target }}
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/retrieval-${{ matrix.target }}:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.owner }}/retrieval-${{ matrix.target }}:latest
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - name: Deploy over SSH
        env:
          HOST: ${{ secrets.VPS_HOST }}
          SSH_USER: ${{ secrets.VPS_USER }}
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          APP_DIR: ${{ vars.VPS_APP_DIR }}
          OWNER: ${{ steps.owner.outputs.owner }}
          TAG: ${{ github.sha }}
          PROFILE: ${{ inputs.profile }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key "$SSH_USER@$HOST" \
            "OWNER='$OWNER' REPO='${{ github.repository }}' TAG='$TAG' PROFILE='$PROFILE' GHCR_TOKEN='$GHCR_TOKEN' APP_DIR='$APP_DIR' bash -s" <<'EOF'
          set -euo pipefail
          APP_DIR="${APP_DIR:-$HOME/travel-plan}"

          # First deploy: clone the repo onto the VPS.
          if [ ! -d "$APP_DIR/.git" ]; then
            echo "==> $APP_DIR missing; cloning $REPO"
            git clone "https://github.com/$REPO.git" "$APP_DIR"
          fi
          cd "$APP_DIR"
          git fetch origin
          git checkout -f "$TAG"

          # The chart's config comes from .env — refuse to deploy without it
          # rather than shipping .env.example placeholders.
          if [ ! -f .env ]; then
            echo "error: $APP_DIR/.env missing." >&2
            echo "  cp .env.example .env  # then set DATABASE_URL, DATABASE_URL_SYNC, REDIS_URL," >&2
            echo "  GOOGLE_API_KEY, BETTER_AUTH_SECRET, GRAFANA_ADMIN_PASSWORD" >&2
            exit 1
          fi

          # Private GHCR packages: refresh the pull secret and attach it to the
          # default service account (the chart's pods all use it).
          if [ -n "${GHCR_TOKEN:-}" ]; then
            KUBECTL="kubectl"
            [ -r /etc/rancher/k3s/k3s.yaml ] && export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            kubectl version --client >/dev/null 2>&1 || KUBECTL="sudo k3s kubectl"
            $KUBECTL create secret docker-registry ghcr-pull \
              --docker-server=ghcr.io \
              --docker-username="$OWNER" \
              --docker-password="$GHCR_TOKEN" \
              --dry-run=client -o yaml | $KUBECTL apply -f -
            $KUBECTL patch serviceaccount default \
              -p '{"imagePullSecrets":[{"name":"ghcr-pull"}]}'
          fi

          SKIP_BUILD=true \
          IMAGE_REGISTRY="ghcr.io/$OWNER" \
          IMAGE_TAG="$TAG" \
          DEPLOY_PROFILE="$PROFILE" \
            bash infra/kubernetes/scripts/deploy-k3s.sh
          EOF
      - name: Smoke check
        if: vars.SMOKE_URL != ''
        run: curl -fsS --retry 10 --retry-delay 6 --retry-all-errors "${{ vars.SMOKE_URL }}"
