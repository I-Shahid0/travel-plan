services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: retrieval-postgres
    environment:
      POSTGRES_USER: retrieval
      POSTGRES_PASSWORD: retrieval
      POSTGRES_DB: retrieval
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retrieval -d retrieval"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: retrieval-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: retrieval-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: retrieval-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    environment:
      JAEGER_ENDPOINT: jaeger:4317
    volumes:
      - ../otel/collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: retrieval-prometheus
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.0
    container_name: retrieval-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  reranker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.reranker
    container_name: retrieval-reranker
    ports:
      - "8001:8001"
    environment:
      RERANKER_DEVICE: cpu
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: reranker-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G
    depends_on:
      - otel-collector

  query:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: query
    container_name: retrieval-query
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://retrieval:retrieval@postgres:5432/retrieval
      DATABASE_URL_SYNC: postgresql://retrieval:retrieval@postgres:5432/retrieval
      REDIS_URL: redis://redis:6379/0
      RERANKER_URL: http://reranker:8001
      EMBEDDING_DEVICE: cpu
      RERANKER_DEVICE: cpu
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: query-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      reranker:
        condition: service_started
      otel-collector:
        condition: service_started

  itinerary:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: itinerary
    container_name: retrieval-itinerary
    ports:
      - "8002:8002"
    environment:
      QUERY_SERVICE_URL: http://query:8000
      LLM_PROVIDER: mock
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: itinerary-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      - query
      - otel-collector

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: worker
    container_name: retrieval-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://retrieval:retrieval@postgres:5432/retrieval
      DATABASE_URL_SYNC: postgresql://retrieval:retrieval@postgres:5432/retrieval
      REDIS_URL: redis://redis:6379/0
      EMBEDDING_DEVICE: cpu
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: ingestion-worker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      WORKER_METRICS_PORT: "9100"
    expose:
      - "9100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started

volumes:
  postgres_data:
