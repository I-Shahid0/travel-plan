apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: corpora.retrieval.example.com
  labels:
    app.kubernetes.io/name: retrieval-engine
    app.kubernetes.io/component: corpus-operator
spec:
  group: retrieval.example.com
  scope: Namespaced
  names:
    kind: Corpus
    listKind: CorpusList
    plural: corpora
    singular: corpus
    shortNames:
      - corp
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                limit:
                  type: integer
                  minimum: 1
                  description: Max records per dataset file during ingest.
                reset:
                  type: boolean
                  default: true
                  description: Truncate tables before ingest.
                dataDir:
                  type: string
                  description: Host path or mount for Yelp JSONL archives.
                pipeline:
                  type: string
                  enum: [ingest, embed, index-fts, pipeline]
                  default: pipeline
                  description: Ingestion job type to enqueue.
              required:
                - limit
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Indexing, Ready, Failed]
                jobId:
                  type: string
                message:
                  type: string
                listings:
                  type: integer
                  minimum: 0
          required:
            - spec
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Job
          type: string
          jsonPath: .status.jobId
        - name: Listings
          type: integer
          jsonPath: .status.listings
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
