{{- if .Values.observability.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "retrieval-engine.fullname" . }}-grafana-provisioning
  labels:
    {{- include "retrieval-engine.labels" . | nindent 4 }}
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://{{ include "retrieval-engine.fullname" . }}-prometheus:9090
        isDefault: true
        editable: false
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: retrieval-engine
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "retrieval-engine.fullname" . }}-grafana-dashboards
  labels:
    {{- include "retrieval-engine.labels" . | nindent 4 }}
data:
  retrieval-engine.json: |
{{ .Files.Get "files/retrieval-engine-dashboard.json" | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "retrieval-engine.fullname" . }}-grafana
  labels:
    {{- include "retrieval-engine.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  type: {{ if .Values.nodePort.enabled }}NodePort{{ else }}ClusterIP{{ end }}
  ports:
    - port: 3000
      targetPort: http
      name: http
      {{- if .Values.nodePort.enabled }}
      nodePort: {{ .Values.nodePort.grafana }}
      {{- end }}
  selector:
    {{- include "retrieval-engine.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "retrieval-engine.fullname" . }}-grafana
  labels:
    {{- include "retrieval-engine.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "retrieval-engine.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        {{- include "retrieval-engine.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: grafana
    spec:
      containers:
        - name: grafana
          image: {{ .Values.observability.grafana.image }}
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: {{ .Values.observability.grafana.anonymousRole | quote }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.observability.grafana.adminPassword | quote }}
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: provisioning
              mountPath: /etc/grafana/provisioning/datasources/datasource.yml
              subPath: datasource.yml
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
              subPath: dashboards.yml
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: provisioning
          configMap:
            name: {{ include "retrieval-engine.fullname" . }}-grafana-provisioning
        - name: dashboards
          configMap:
            name: {{ include "retrieval-engine.fullname" . }}-grafana-dashboards
{{- end }}
