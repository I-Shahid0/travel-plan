apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "retrieval-engine.fullname" . }}-worker
  labels:
    {{- include "retrieval-engine.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.services.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "retrieval-engine.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "retrieval-engine.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      {{- if .Values.postgres.enabled }}
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z {{ include "retrieval-engine.postgresHost" . }} {{ .Values.postgres.port }}; do echo waiting for postgres; sleep 2; done
        - name: wait-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z {{ include "retrieval-engine.redisHost" . }} {{ .Values.redis.port }}; do echo waiting for redis; sleep 2; done
      {{- end }}
      containers:
        - name: worker
          image: {{ include "retrieval-engine.image" (dict "Values" .Values "imageName" "retrieval-worker") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- include "retrieval-engine.envFrom" . }}
          env:
            - name: OTEL_SERVICE_NAME
              value: ingestion-worker
          startupProbe:
            exec:
              command:
                - python
                - -c
                - |
                  import redis
                  r = redis.from_url(
                      "redis://{{ include "retrieval-engine.redisHost" . }}:{{ .Values.redis.port }}/0",
                      socket_connect_timeout=5,
                  )
                  r.ping()
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 30
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - |
                  import redis
                  r = redis.from_url(
                      "redis://{{ include "retrieval-engine.redisHost" . }}:{{ .Values.redis.port }}/0",
                      socket_connect_timeout=5,
                  )
                  r.ping()
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.services.worker.resources | nindent 12 }}
