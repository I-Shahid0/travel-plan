{{- if .Values.ingress.enabled }}
{{- $fullname := include "retrieval-engine.fullname" . }}
{{- $hosts := list }}
{{- if .Values.ingress.hosts.query }}
{{- $hosts = append $hosts (dict "host" .Values.ingress.hosts.query "service" (printf "%s-query" $fullname) "port" .Values.services.query.port) }}
{{- end }}
{{- if .Values.ingress.hosts.itinerary }}
{{- $hosts = append $hosts (dict "host" .Values.ingress.hosts.itinerary "service" (printf "%s-itinerary" $fullname) "port" .Values.services.itinerary.port) }}
{{- end }}
{{- if and .Values.ingress.hosts.grafana .Values.observability.grafana.enabled }}
{{- $hosts = append $hosts (dict "host" .Values.ingress.hosts.grafana "service" (printf "%s-grafana" $fullname) "port" 3000) }}
{{- end }}
{{- if $hosts }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "retrieval-engine.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        {{- range $hosts }}
        - {{ .host | quote }}
        {{- end }}
      {{- with .Values.ingress.tls.secretName }}
      secretName: {{ . }}
      {{- end }}
  {{- end }}
  rules:
    {{- range $hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .service }}
                port:
                  number: {{ .port }}
    {{- end }}
{{- end }}
{{- end }}
