# k3s production profile (single-node VPS). Layer this AFTER values-external.yaml:
#
#   helm upgrade --install retrieval . -f values-external.yaml -f values-k3s.yaml ...
#
# infra/kubernetes/scripts/deploy-k3s.sh does exactly that. DB (Neon) and Redis
# (Upstash) stay external — the VPS only runs the app + observability pods.

# Traefik ships with k3s; DNS A records for these must point at the VPS.
# deploy-k3s.sh overrides these from INGRESS_HOST_QUERY / _ITINERARY / _GRAFANA.
# TLS: certificates come from Traefik's Let's Encrypt resolver (configured by
# infra/kubernetes/k3s/traefik-config.yaml, applied by deploy-k3s.sh) — the
# certresolver annotation below is what turns it on; the chart's ingress.tls
# secret block stays off. HTTP redirects to HTTPS at the entrypoint.
ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
  hosts:
    web: meridian.ishahid.pro
    query: api.ishahid.pro
    itinerary: itinerary.ishahid.pro
    grafana: grafana.ishahid.pro
  tls:
    enabled: false
    secretName: ""

# Grafana is public behind the ingress: anonymous visitors get read-only
# dashboards; the admin password comes from GRAFANA_ADMIN_PASSWORD in the VPS
# .env (deploy-k3s.sh passes it through; falls back to chart default if unset).
observability:
  grafana:
    anonymousRole: Viewer

# The VPS is RAM-constrained: keep single replicas and let KEDA scale the
# worker to zero when the ingestion queue is idle.
keda:
  enabled: true
  worker:
    minReplicas: 0
    maxReplicas: 1
    listLength: 5

services:
  # Meridian frontend — public at ingress.hosts.web. Needs BETTER_AUTH_SECRET
  # (and the usual DATABASE_URL_SYNC) in the VPS .env.
  web:
    enabled: true
  reranker:
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1536Mi
