nameOverride: ""
fullnameOverride: retrieval

image:
  registry: ""
  pullPolicy: IfNotPresent
  tag: latest

services:
  query:
    replicaCount: 1
    port: 8000
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 512Mi
    hpa:
      enabled: false
  reranker:
    replicaCount: 1
    port: 8001
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi
    hpa:
      enabled: false
  itinerary:
    replicaCount: 1
    port: 8002
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 250m
        memory: 512Mi
  worker:
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 250m
        memory: 512Mi
  imageEnrichment:
    replicaCount: 1
    port: 8003
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

postgres:
  enabled: true
  image: pgvector/pgvector:pg16
  port: 5432
  user: retrieval
  password: retrieval
  database: retrieval
  persistence:
    size: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

redis:
  enabled: true
  image: redis:7-alpine
  port: 6379
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# Parsed from REDIS_URL when deploying with values-external.yaml + load-env --profile external.
# Used by KEDA to scale workers against Upstash (TLS + password).
externalRedis:
  address: ""
  password: ""
  tls: false

observability:
  jaeger:
    enabled: true
    image: jaegertracing/all-in-one:1.57
  otelCollector:
    enabled: true
    image: otel/opentelemetry-collector-contrib:0.96.0
  prometheus:
    enabled: true
    image: prom/prometheus:v2.53.0
  grafana:
    enabled: true
    image: grafana/grafana:11.1.0

# Requires the KEDA operator (deploy script installs it when enabled).
keda:
  enabled: true
  worker:
    minReplicas: 1
    maxReplicas: 1
    listLength: 5 # target jobs waiting per worker replica
  reranker:
    # Latency-based scaling via Prometheus; set services.reranker.hpa.enabled=false
    # when turning this on (KEDA manages its own HPA for the target).
    enabled: false
    minReplicas: 1
    maxReplicas: 1
    p95ThresholdMs: 500

# Populated at deploy time from .env by infra/kubernetes/scripts/load-env.*
appEnv: {}
appSecrets: {}

bootstrap:
  sampleIngest:
    enabled: false
    limit: 5000

# Optional stretch — Corpus CRD operator provisions indexes via the ingestion queue.
corpusOperator:
  enabled: false
  pollIntervalSec: 5
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

nodePort:
  enabled: false
  query: 30079
  itinerary: 30081
  grafana: 30030

# Host-based ingress (k3s ships Traefik as the default class). A rule is only
# rendered for hosts that are set; leave a host empty to keep it private.
ingress:
  enabled: false
  className: traefik
  annotations: {}
  hosts:
    query: "" # e.g. api.example.com
    itinerary: "" # e.g. itinerary.example.com
    grafana: "" # e.g. grafana.example.com
  tls:
    enabled: false
    secretName: "" # cert-manager-provisioned or manually created TLS secret
