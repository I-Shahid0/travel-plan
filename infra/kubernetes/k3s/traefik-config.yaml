# Customizes the Traefik that ships with k3s (helm.cattle.io HelmChartConfig —
# k3s's helm controller merges valuesContent into the bundled traefik chart).
# Applied idempotently by deploy-k3s.sh.
#
# - Let's Encrypt resolver "letsencrypt" via TLS-ALPN challenge (needs :443
#   reachable from the internet). Ingresses opt in with the
#   router.tls.certresolver=letsencrypt annotation (see values-k3s.yaml).
# - Certificates persist in a PVC (local-path) so restarts don't re-issue.
# - All plain HTTP redirects to HTTPS at the entrypoint.
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    additionalArguments:
      - "--certificatesresolvers.letsencrypt.acme.email=armghan@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/data/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
    persistence:
      enabled: true
      path: /data
    deployment:
      initContainers:
        # acme.json must be 600 or Traefik refuses to use it.
        - name: volume-permissions
          image: busybox:1.36
          command: ["sh", "-c", "touch /data/acme.json && chmod 600 /data/acme.json"]
          volumeMounts:
            - name: data
              mountPath: /data
