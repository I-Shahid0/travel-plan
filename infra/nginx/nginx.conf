# Meridian edge: reverse proxy in front of the Next.js app (no domain yet —
# listens on plain :80). Provides response caching for immutable build assets,
# per-IP rate limiting (stricter on credential endpoints), security headers,
# and a stub_status endpoint scraped by nginx-prometheus-exporter.
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - [$time_local] "$request" $status '
                    '$body_bytes_sent rt=$request_time cache=$upstream_cache_status';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain;

    # ---- rate limiting -------------------------------------------------
    # General browsing: 20 req/s per IP with a generous burst for RSC
    # prefetching. Credential endpoints: 10/min per IP against stuffing.
    limit_req_zone $binary_remote_addr zone=app:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=credentials:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=perip:10m;
    limit_req_status 429;
    limit_conn_status 429;

    # ---- response cache for immutable Next build assets ----------------
    proxy_cache_path /var/cache/nginx/meridian
        levels=1:2 keys_zone=static_cache:10m max_size=256m
        inactive=7d use_temp_path=off;

    upstream meridian_web {
        server web:3001;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        limit_conn perip 32;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Prometheus scrape target is compose-network-only, never public.
        location = /api/metrics {
            return 404;
        }

        # Sign-in / sign-up / password endpoints: strict per-IP budget.
        location ~ ^/api/auth/(sign-in|sign-up|forget-password|reset-password) {
            limit_req zone=credentials burst=5 nodelay;
            proxy_pass http://meridian_web;
        }

        location /api/auth/ {
            limit_req zone=app burst=40 nodelay;
            proxy_pass http://meridian_web;
        }

        # Hashed, immutable build assets — cache at the edge for a week.
        location /_next/static/ {
            limit_req zone=app burst=200 nodelay;
            proxy_cache static_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_lock on;
            add_header X-Cache-Status $upstream_cache_status always;
            proxy_pass http://meridian_web;
        }

        location / {
            limit_req zone=app burst=60 nodelay;
            proxy_pass http://meridian_web;
        }
    }

    # Exporter-only vhost (port not published to the host).
    server {
        listen 8080;
        location = /stub_status {
            stub_status;
        }
    }
}
