global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: query-service
    static_configs:
      - targets: ["query:8000"]
  - job_name: reranker-service
    static_configs:
      - targets: ["reranker:8001"]
  - job_name: itinerary-service
    static_configs:
      - targets: ["itinerary:8002"]
  - job_name: ingestion-worker
    static_configs:
      - targets: ["worker:9100"]
